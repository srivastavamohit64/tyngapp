<ion-content fullscreen>
  <main class="safe-area-bottom min-h-full bg-background text-white">

    <!-- Header -->
    <header class="px-6 py-4 sticky top-0 z-10 bg-background flex items-center justify-between border-b border-white/5">
      <div class="flex items-center gap-3">
        <button (click)="goBack()"
          class="text-slate-400 flex items-center bg-transparent active:scale-95 transition-all">
          <ion-icon name="chevron-back-outline" class="text-2xl text-white"></ion-icon>
        </button>
        <h2 class="text-xl font-bold tracking-tight text-white">Settings</h2>
      </div>
    </header>

    <!-- Settings List -->
    <section class="space-y-3 px-6 py-5">
      <button *ngFor="let option of options"
        class="h-16 w-full rounded-2xl border border-white/10 bg-card hover:border-primary/50 transition-all duration-300 active:scale-[0.98] flex items-center justify-between px-5 text-white bg-transparent">
        <div class="row_design flex items-center gap-3">
          <div class="w-10 h-10 rounded-xl bg-primary/10 flex items-center justify-center text-primary">
            <ion-icon [name]="option.icon" class="text-xl"></ion-icon>
          </div>
          <span class="font-bold text-sm">{{ option.name }}</span>
        </div>
        <ion-icon name="chevron-forward-outline" class="text-slate-400 text-lg"></ion-icon>
      </button>
    </section>

  </main>
</ion-content>
