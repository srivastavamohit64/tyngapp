<ion-content fullscreen>
  <main class="safe-area-top page-with-tab-bar min-h-full bg-background text-white">
    <header class="bg-card border-b border-white/10 px-6 py-4 sticky top-0 z-10">
      <div class="flex items-center gap-3">
        <button (click)="goHome()" class="text-slate-400 flex items-center bg-transparent">
          <ion-icon name="chevron-back-outline" class="text-2xl"></ion-icon>
        </button>
        <h2 class="text-xl font-bold tracking-tight">Revenue Analytics</h2>
      </div>
    </header>

    <section class="px-6 py-6 space-y-6">
      <!-- Revenue Overview -->
      <div>
        <h3 class="mb-4 text-lg font-bold text-slate-300">Revenue Overview</h3>
        <div class="space-y-3">
          <div
            *ngFor="let stat of stats"
            class="bg-card p-4 rounded-xl border border-white/10 flex items-center justify-between"
          >
            <div class="flex items-center gap-4">
              <div class="w-12 h-12 rounded-lg bg-primary/20 flex items-center justify-center text-primary">
                <ion-icon [name]="stat.icon" class="text-2xl"></ion-icon>
              </div>
              <div>
                <div class="text-xs text-slate-400 mb-1 font-medium">{{ stat.label }}</div>
                <div class="text-2xl font-bold text-white">{{ stat.value }}</div>
              </div>
            </div>
            <div class="text-secondary text-sm font-semibold">{{ stat.change }}</div>
          </div>
        </div>
      </div>

      <!-- Top Customers -->
      <div>
        <h3 class="mb-4 text-lg font-bold text-slate-300">Top Customers</h3>
        <div class="bg-card rounded-xl border border-white/10 overflow-hidden">
          <div
            *ngFor="let customer of topCustomers; let idx = index"
            class="p-4 flex items-center justify-between border-b border-white/10 last:border-0"
          >
            <div class="flex items-center gap-3">
              <div class="w-8 h-8 rounded-full bg-gradient-to-br from-primary to-secondary flex items-center justify-center text-white text-sm font-bold">
                {{ idx + 1 }}
              </div>
              <div>
                <div class="font-semibold text-white">{{ customer.name }}</div>
                <div class="text-xs text-slate-400">{{ customer.bookings }} bookings</div>
              </div>
            </div>
            <div class="text-primary font-bold">{{ customer.revenue }}</div>
          </div>
        </div>
      </div>

      <!-- Peak Hours -->
      <div>
        <h3 class="mb-4 text-lg font-bold text-slate-300">Peak Hours</h3>
        <div class="space-y-3">
          <div
            *ngFor="let hour of peakHours"
            class="bg-card p-4 rounded-xl border border-white/10"
          >
            <div class="flex items-center justify-between mb-2 text-sm font-medium">
              <span class="text-white">{{ hour.time }}</span>
              <span class="text-slate-400">{{ hour.bookings }} bookings</span>
            </div>
            <div class="h-2 bg-slate-800 rounded-full overflow-hidden">
              <div
                class="h-full bg-gradient-to-r from-primary to-secondary rounded-full"
                [style.width.%]="hour.percentage"
              ></div>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>
</ion-content>
