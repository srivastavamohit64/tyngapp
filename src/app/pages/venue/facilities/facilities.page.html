<ion-content fullscreen>
  <main class="safe-area-top page-with-tab-bar min-h-full bg-background text-white">
    <header class="bg-card border-b border-white/10 px-6 py-4 sticky top-0 z-10">
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-3">
          <button (click)="goBack()" class="text-slate-400 flex items-center bg-transparent">
            <ion-icon name="chevron-back-outline" class="text-2xl"></ion-icon>
          </button>
          <h2 class="text-xl font-bold tracking-tight">Facilities</h2>
        </div>
        <button class="w-10 h-10 rounded-full bg-primary/20 flex items-center justify-center text-primary">
          <ion-icon name="add-outline" class="text-xl"></ion-icon>
        </button>
      </div>
    </header>

    <section class="px-6 py-6 space-y-6">
      <!-- Courts & Grounds -->
      <div>
        <h3 class="mb-4 text-lg font-bold text-slate-300">Courts & Grounds</h3>
        <div class="space-y-3">
          <div
            *ngFor="let facility of facilities"
            class="bg-card p-4 rounded-xl border border-white/10"
          >
            <div class="flex items-start justify-between mb-3">
              <div class="flex-grow">
                <div class="flex items-center gap-2 mb-1">
                  <h3 class="font-bold text-white text-base">{{ facility.name }}</h3>
                  <span
                    class="px-2 py-0.5 rounded-full text-[10px] font-bold inline-flex items-center gap-1"
                    [ngClass]="{
                      'bg-secondary/20 text-secondary': facility.status === 'active',
                      'bg-accent/20 text-accent': facility.status === 'maintenance'
                    }"
                  >
                    <ion-icon [name]="facility.status === 'active' ? 'checkmark-circle-outline' : 'settings-outline'"></ion-icon>
                    {{ facility.status | titlecase }}
                  </span>
                </div>
                <div class="text-xs text-slate-400">{{ facility.type }}</div>
              </div>
            </div>

            <div class="grid grid-cols-3 gap-3 mb-3 text-center border-t border-b border-white/5 py-3 my-3">
              <div>
                <div class="text-[10px] text-slate-400 mb-1">Capacity</div>
                <div class="text-xs font-semibold text-white">{{ facility.capacity }}</div>
              </div>
              <div>
                <div class="text-[10px] text-slate-400 mb-1">Price</div>
                <div class="text-xs font-semibold text-white">{{ facility.price }}</div>
              </div>
              <div>
                <div class="text-[10px] text-slate-400 mb-1">Next Service</div>
                <div class="text-xs font-semibold text-white">{{ facility.nextMaintenance }}</div>
              </div>
            </div>

            <button class="w-full py-2 border border-white/10 rounded-lg hover:border-primary transition-colors text-sm font-semibold active:scale-[0.98] bg-transparent text-slate-300">
              Manage Facility
            </button>
          </div>
        </div>
      </div>

      <!-- Amenities Status -->
      <div>
        <h3 class="mb-4 text-lg font-bold text-slate-300">Amenities Status</h3>
        <div class="grid grid-cols-2 gap-3">
          <div
            *ngFor="let amenity of amenities"
            class="p-4 rounded-xl border-2 flex items-center justify-between"
            [ngClass]="{
              'border-secondary/30 bg-secondary/5': amenity.status === 'working',
              'border-accent/30 bg-accent/5': amenity.status === 'issue'
            }"
          >
            <span class="font-semibold text-sm">{{ amenity.name }}</span>
            <ion-icon
              [name]="amenity.status === 'working' ? 'checkmark-circle' : 'alert-circle'"
              class="text-xl"
              [ngClass]="{
                'text-secondary': amenity.status === 'working',
                'text-accent': amenity.status === 'issue'
              }"
            ></ion-icon>
          </div>
        </div>
      </div>
    </section>
  </main>
</ion-content>
