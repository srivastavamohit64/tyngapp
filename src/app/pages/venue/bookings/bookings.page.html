<ion-content fullscreen>
  <main class="safe-area-top page-with-tab-bar min-h-full bg-background text-white">
    <header class="bg-card border-b border-white/10 px-6 py-4 sticky top-0 z-10">
      <div class="flex items-center justify-between mb-4">
        <div class="flex items-center gap-3">
          <button (click)="goHome()" class="text-slate-400 flex items-center bg-transparent">
            <ion-icon name="chevron-back-outline" class="text-2xl"></ion-icon>
          </button>
          <h2 class="text-xl font-bold tracking-tight">Bookings</h2>
        </div>
        <button class="w-10 h-10 rounded-full bg-primary/20 flex items-center justify-center">
          <ion-icon name="funnel-outline" class="text-xl text-primary"></ion-icon>
        </button>
      </div>

      <div class="relative mb-4">
        <ion-icon name="search-outline" class="absolute left-4 top-1/2 -translate-y-1/2 text-xl text-slate-400"></ion-icon>
        <input
          type="text"
          [(ngModel)]="searchQuery"
          placeholder="Search bookings..."
          class="w-full pl-12 pr-4 py-3 bg-background rounded-xl border border-white/10 focus:border-primary focus:outline-none text-white transition-colors"
        />
      </div>

      <div class="flex gap-2 overflow-x-auto pb-2 scrollbar-none">
        <button
          *ngFor="let filter of filters"
          (click)="selectedFilter = filter"
          class="px-4 py-2 rounded-lg text-sm font-semibold whitespace-nowrap transition-all flex-shrink-0"
          [class]="selectedFilter === filter ? 'bg-primary text-white' : 'bg-slate-800 text-slate-400'"
        >
          {{ filter | titlecase }}
        </button>
      </div>
    </header>

    <section class="px-6 py-6 space-y-4">
      <div
        *ngFor="let booking of filteredBookings"
        class="bg-card p-4 rounded-xl border border-white/10"
      >
        <div class="flex items-start justify-between mb-3">
          <div class="flex-1">
            <div class="flex items-center gap-2 mb-2 text-xs text-slate-400 font-medium">
              <ion-icon name="calendar-outline"></ion-icon>
              <span>{{ booking.date }}</span>
              <ion-icon name="time-outline" class="ml-2"></ion-icon>
              <span>{{ booking.time }}</span>
            </div>
            <div class="font-bold text-white mb-0.5">{{ booking.customer }}</div>
            <div class="text-sm text-slate-400">{{ booking.court }}</div>
          </div>
          <div class="text-right">
            <div class="font-bold text-white mb-2">{{ booking.amount }}</div>
            <span
              class="rounded-full px-2 py-0.5 text-[10px] font-bold inline-flex items-center gap-1"
              [ngClass]="{
                'bg-secondary/20 text-secondary': booking.status === 'confirmed',
                'bg-accent/20 text-accent': booking.status === 'pending'
              }"
            >
              <ion-icon [name]="booking.status === 'pending' ? 'alert-circle-outline' : 'checkmark-circle-outline'"></ion-icon>
              {{ booking.status | titlecase }}
            </span>
          </div>
        </div>

        <div class="bg-slate-800/30 p-3 rounded-lg mb-3 border border-white/5">
          <div class="text-xs text-slate-400 mb-1">Deposit Received</div>
          <div class="text-sm font-semibold text-white">{{ booking.deposit }}</div>
        </div>

        <div *ngIf="booking.status === 'pending'" class="flex gap-2">
          <button
            class="flex-1 bg-primary text-white py-2 rounded-lg font-semibold active:scale-[0.98]"
            (click)="acceptBooking(booking.id)"
          >
            Accept
          </button>
          <button
            class="px-4 py-2 border border-white/10 rounded-lg hover:border-red-500 hover:text-red-500 transition-colors font-semibold active:scale-[0.98] bg-transparent text-slate-400"
            (click)="declineBooking(booking.id)"
          >
            Decline
          </button>
        </div>
      </div>

      <div *ngIf="filteredBookings.length === 0" class="text-center py-12 text-slate-500">
        <ion-icon name="calendar-clear-outline" class="text-5xl mb-3"></ion-icon>
        <p>No bookings found matching filter</p>
      </div>
    </section>
  </main>
</ion-content>
