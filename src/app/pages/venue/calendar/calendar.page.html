<ion-content fullscreen>
  <main class="safe-area-top page-with-tab-bar min-h-full bg-background text-white">
    <header class="bg-card border-b border-white/10 px-6 py-4 sticky top-0 z-10">
      <div class="flex items-center justify-between mb-4">
        <div class="flex items-center gap-3">
          <button (click)="goHome()" class="text-slate-400 flex items-center bg-transparent">
            <ion-icon name="chevron-back-outline" class="text-2xl"></ion-icon>
          </button>
          <h2 class="text-xl font-bold tracking-tight">Calendar</h2>
        </div>
      </div>

      <div class="flex items-center justify-between">
        <button class="w-8 h-8 rounded-full bg-slate-800 flex items-center justify-center text-white active:scale-95">
          <ion-icon name="chevron-back-outline"></ion-icon>
        </button>
        <div class="flex items-center gap-2 font-semibold">
          <ion-icon name="calendar-outline" class="text-primary text-lg"></ion-icon>
          <span>Today - April 22, 2026</span>
        </div>
        <button class="w-8 h-8 rounded-full bg-slate-800 flex items-center justify-center text-white active:scale-95">
          <ion-icon name="chevron-forward-outline"></ion-icon>
        </button>
      </div>
    </header>

    <section class="overflow-x-auto p-6">
      <div class="min-w-[700px]">
        <div class="grid grid-cols-[100px_1fr] gap-2">
          <div></div>
          <div class="grid grid-cols-3 gap-2">
            <div *ngFor="let court of courts" class="text-center p-2 bg-card rounded-lg border border-white/10">
              <div class="text-sm font-semibold">{{ court }}</div>
            </div>
          </div>

          <ng-container *ngFor="let time of timeSlots">
            <div class="flex items-center justify-end pr-3 text-sm text-slate-400 font-medium">
              {{ time }}
            </div>
            <div class="grid grid-cols-3 gap-2">
              <div *ngFor="let court of courts" class="h-16 rounded-lg border-2 relative transition-all"
                [ngClass]="{
                  'bg-primary/20 border-primary cursor-pointer hover:bg-primary/30': getBooking(court, time),
                  'bg-card border-white/10 hover:border-primary/50 cursor-pointer': !getBooking(court, time)
                }"
              >
                <div *ngIf="getBooking(court, time) as booking" class="p-2 h-full flex flex-col justify-center">
                  <div class="text-xs text-primary font-bold truncate">{{ booking.customer }}</div>
                  <div class="text-[10px] text-slate-400 mt-0.5">{{ booking.duration }}h</div>
                </div>
              </div>
            </div>
          </ng-container>
        </div>
      </div>
    </section>
  </main>
</ion-content>
