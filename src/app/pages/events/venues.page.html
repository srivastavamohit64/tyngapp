<ion-content fullscreen class="has-tabs">
  <app-brand-header-shell>
  <main class="page-with-tab-bar min-h-full bg-[#FAFBFC] text-slate-800">

    <div class="px-5 pt-4 pb-2">
      <h2 class="text-[20px] font-bold tracking-tight text-slate-900 m-0">Book Venue</h2>
    </div>

    <!-- Venue Hero/Visual section -->
    <section class="px-5 pt-2">
      <div
        class="bg-gradient-to-br from-[#8CF000]/20 to-[#FF7A00]/20 w-full h-44 rounded-3xl flex items-center justify-center gap-6 relative overflow-hidden shadow-sm"
      >
        <span class="text-5xl">Stadium 🏟️</span>
      </div>
    </section>

    <!-- Venue Info -->
    <section class="px-6 py-5 space-y-2">
      <div class="flex items-start justify-between">
        <h1 class="text-[26px] font-black tracking-tight text-[#111827] leading-tight">Phoenix Arena</h1>
        <div class="flex items-center gap-1 rounded-full bg-[#FF7A00]/10 px-3 py-1.5 text-sm text-[#FF7A00] font-bold">
          <ion-icon name="star" class="text-base"></ion-icon>
          <span>4.8</span>
        </div>
      </div>
      <p class="text-sm text-slate-500 font-medium">342 reviews</p>
      <div class="flex items-center gap-1 text-sm text-slate-500 font-medium pt-1">
        <ion-icon name="location-outline" class="text-slate-500 text-base"></ion-icon>
        <span>Gomti Nagar, Lucknow</span>
        <span class="mx-1.5">•</span>
        <span>2.3 km away</span>
      </div>
    </section>

    <!-- Amenities Grid -->
    <section class="px-6 py-3">
      <h3 class="text-base font-extrabold text-slate-900 mb-4 uppercase tracking-wider">Amenities</h3>
      <div class="grid grid-cols-2 gap-3">
        <div *ngFor="let amenity of amenities"
          class="flex items-center gap-3 bg-white border border-slate-100 rounded-2xl p-4 transition-all duration-300 hover:border-[#8CF000]">
          <div class="w-10 h-10 rounded-full bg-[#8CF000]/15 flex items-center justify-center text-[#73C000]">
            <ion-icon [name]="amenity.icon" class="text-xl"></ion-icon>
          </div>
          <span class="text-sm font-bold text-slate-800">{{ amenity.name }}</span>
        </div>
      </div>
    </section>

    <!-- Special Offers Box -->
    <section class="px-6 py-4">
      <div class="bg-gradient-to-r from-orange-50/50 to-orange-100/50 rounded-2xl p-5 border border-orange-200/50 relative overflow-hidden">
        <h3 class="text-base font-extrabold text-[#FF7A00] mb-3 uppercase tracking-wider">Special Offers</h3>
        <ul class="space-y-2">
          <li *ngFor="let offer of offers" class="flex items-center gap-2.5 text-sm font-semibold text-slate-800">
            <ion-icon name="checkmark-circle" class="text-[#FF7A00] text-lg"></ion-icon>
            {{ offer }}
          </li>
        </ul>
      </div>
    </section>

    <!-- Available Slots -->
    <section class="px-6 py-4">
      <div class="flex items-center justify-between mb-4">
        <h3 class="text-base font-extrabold text-slate-900 uppercase tracking-wider">Available Slots</h3>
        <span class="text-sm text-slate-500 font-black">
          ₹1500/hr
        </span>
      </div>
      <div class="space-y-3">
        <button *ngFor="let slot of slots; let i = index" (click)="selectSlot(i)" [disabled]="slot.booked"
          [class.selected-slot]="selectedSlotIndex === i" [class.booked-slot]="slot.booked"
          class="w-full bg-white border border-slate-100 rounded-[20px] p-4 flex items-center justify-between transition-all duration-300 hover:border-primary active:scale-[0.99] text-left bg-transparent select-none"
          [style.borderColor]="selectedSlotIndex === i ? '#8CF000' : null"
          [style.backgroundColor]="selectedSlotIndex === i ? 'rgba(140,240,0,0.06)' : null"
        >
          <div class="flex items-center gap-3">
            <ion-icon name="time-outline"
              [class]="selectedSlotIndex === i ? 'text-primary text-xl' : 'text-slate-400 text-xl'"></ion-icon>
            <div>
              <span class="font-bold text-sm" [ngClass]="{
                  'text-slate-900': selectedSlotIndex === i,
                  'text-slate-700': selectedSlotIndex !== i && !slot.booked,
                  'text-slate-400': slot.booked
                }">{{ slot.time }}</span>
              <div *ngIf="slot.booked" class="text-xs text-red-500 font-bold mt-0.5">Booked</div>
            </div>
          </div>
          <span class="font-bold text-sm" [ngClass]="{
              'text-slate-900': selectedSlotIndex === i,
              'text-slate-700': selectedSlotIndex !== i && !slot.booked,
              'text-slate-400': slot.booked
            }">{{ slot.price }}</span>
        </button>
      </div>
    </section>

    <!-- Proceed Button inside scroll flow -->
    <div class="px-6 py-6 mt-6">
      <button (click)="proceed()" [disabled]="selectedSlotIndex === null"
        class="w-full h-12 rounded-full bg-gradient-to-r from-[#8CF000] to-[#A3E635] text-[#111827] font-extrabold text-base shadow-md disabled:bg-none disabled:bg-[#F3F4F6] disabled:text-[#9CA3AF] disabled:opacity-100 disabled:cursor-not-allowed transition-all flex items-center justify-center gap-2"
      >
        <span>Proceed to Payment</span>
      </button>
    </div>

  </main>
  </app-brand-header-shell>
</ion-content>
