<ion-content fullscreen>
  <main class="safe-area-top min-h-full bg-background text-white pb-32">

    <!-- Custom Header -->
    <header class="px-6 py-4 sticky top-0 z-10 bg-background flex items-center justify-between border-b border-border">
      <div class="flex items-center gap-3">
        <button (click)="goBack()"
          class="text-slate-400 flex items-center bg-transparent active:scale-95 transition-all">
          <ion-icon name="chevron-back-outline" class="text-2xl text-white"></ion-icon>
        </button>
        <h2 class="text-xl font-bold tracking-tight text-white">Book Venue</h2>
      </div>
    </header>

    <!-- Venue Hero/Visual section -->
    <section class="px-6 pt-4">
      <div
        class="hero-gradient w-full h-44 rounded-3xl flex items-center justify-center gap-6 relative overflow-hidden">
        <span class="text-5xl animate-bounce-custom">🏟️</span>
        <span class="text-5xl animate-bounce-custom delay-100">⚽</span>
        <span class="text-5xl animate-bounce-custom delay-200">🎯</span>
      </div>
    </section>

    <!-- Venue Info -->
    <section class="px-6 py-5 space-y-2">
      <div class="flex items-start justify-between">
        <h1 class="text-3xl font-extrabold tracking-tight text-white leading-tight">Phoenix Arena</h1>
        <div class="flex items-center gap-1 rounded-full bg-accent/20 px-3 py-1.5 text-sm text-accent font-bold">
          <ion-icon name="star" class="text-base"></ion-icon>
          <span>4.8</span>
        </div>
      </div>
      <p class="text-sm text-slate-400 font-medium">342 reviews</p>
      <div class="flex items-center gap-1 text-sm text-slate-400 font-medium pt-1">
        <ion-icon name="location-outline" class="text-slate-400 text-base"></ion-icon>
        <span>Gomti Nagar, Lucknow</span>
        <span class="mx-1.5">•</span>
        <span>2.3 km away</span>
      </div>
    </section>

    <!-- Amenities Grid -->
    <section class="px-6 py-3">
      <h3 class="text-lg font-bold text-white mb-4">Amenities</h3>
      <div class="grid grid-cols-2 gap-3">
        <div *ngFor="let amenity of amenities"
          class="flex items-center gap-3 bg-card border border-white/10 rounded-2xl p-4 transition-all duration-300 hover:border-primary/50">
          <div class="w-10 h-10 rounded-full bg-primary/20 flex items-center justify-center text-primary">
            <ion-icon [name]="amenity.icon" class="text-xl"></ion-icon>
          </div>
          <span class="text-sm font-semibold text-white">{{ amenity.name }}</span>
        </div>
      </div>
    </section>

    <!-- Special Offers Box -->
    <section class="px-6 py-4">
      <div class="offers-card rounded-2xl p-5 border border-secondary/30 relative overflow-hidden">
        <h3 class="text-lg font-bold text-white mb-3">Special Offers</h3>
        <ul class="space-y-2">
          <li *ngFor="let offer of offers" class="flex items-center gap-2.5 text-sm font-semibold text-white">
            <ion-icon name="checkmark-circle" class="text-secondary text-lg"></ion-icon>
            {{ offer }}
          </li>
        </ul>
      </div>
    </section>

    <!-- Available Slots -->
    <section class="px-6 py-4">
      <div class="flex items-center justify-between mb-4">
        <h3 class="text-lg font-bold text-white">Available Slots</h3>
        <span class="text-sm text-slate-400 font-bold flex items-center gap-1">
          ₹1500/hr
        </span>
      </div>
      <div class="space-y-3">
        <button *ngFor="let slot of slots; let i = index" (click)="selectSlot(i)" [disabled]="slot.booked"
          [class.selected-slot]="selectedSlotIndex === i" [class.booked-slot]="slot.booked"
          class="av_slots w-full bg-card border border-white/10 rounded-[20px] p-4.5 flex items-center justify-between transition-all duration-300 hover:border-primary active:scale-[0.99] text-left bg-transparent">
          <div class="flex items-center gap-3">
            <ion-icon name="time-outline"
              [class]="selectedSlotIndex === i ? 'text-primary text-xl' : 'text-slate-500 text-xl'"></ion-icon>
            <div>
              <span class="font-semibold text-sm" [ngClass]="{
                  'text-primary': selectedSlotIndex === i,
                  'text-slate-400': selectedSlotIndex !== i && !slot.booked,
                  'text-slate-600': slot.booked
                }">{{ slot.time }}</span>
              <div *ngIf="slot.booked" class="text-xs text-red-500/80 font-bold mt-0.5">Booked</div>
            </div>
          </div>
          <span class="font-semibold text-sm" [ngClass]="{
              'text-primary': selectedSlotIndex === i,
              'text-slate-400': selectedSlotIndex !== i && !slot.booked,
              'text-slate-600': slot.booked
            }">{{ slot.price }}</span>
        </button>
      </div>
    </section>

    <!-- Proceed Button inside scroll flow -->
    <div class="px-6 py-6 mt-6">
      <button (click)="proceed()" [disabled]="selectedSlotIndex === null"
        class="w-full h-14 rounded-2xl bg-primary text-white font-extrabold text-base shadow-lg shadow-primary/20 active:scale-[0.98] transition-all flex flex-col items-center justify-center disabled:opacity-50 disabled:pointer-events-none cursor-pointer">
        <span>Proceed to Payment</span>
        <span class="text-[10px] text-white/70 font-semibold mt-0.5">Create Game</span>
      </button>
    </div>

  </main>
</ion-content>
