<ion-content fullscreen>
  <div class="page-safe">
    <section class="hero">
      <div class="header-row">
        <h2>Discover Players</h2>
        <ion-icon name="options-outline" color="primary"></ion-icon>
      </div>
      <div class="chips">
        <button *ngFor="let skill of skills" [class.active]="selectedSkill === skill" (click)="selectedSkill = skill">
          {{ skill | titlecase }}
        </button>
      </div>
    </section>

    <section class="content-pad list">
      <div class="card player-row" *ngFor="let player of players">
        <div class="avatar">{{ player.avatar }}</div>
        <div class="player-info">
          <div class="header-row">
            <div>
              <strong>{{ player.name }}</strong>
              <div class="caption muted">{{ player.sport }}</div>
            </div>
            <span class="badge orange">★ {{ player.rating }}</span>
          </div>
          <div class="meta muted">
            <span>{{ player.skill }}</span>
            <span>{{ player.distance }}</span>
            <span>{{ player.games }} games</span>
          </div>
          <div class="progress"><span [style.width.%]="player.reliability"></span></div>
          <button class="primary-action">Invite</button>
        </div>
      </div>
    </section>
  </div>
</ion-content>
